detector:
  model: ppo
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  window_size: 5
  d_model: 64
  total_timesteps: 500000

classifier:
  model_name: distilbert-base-uncased
  num_labels: 8
  num_epochs: 5
  batch_size: 32
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_length: 128
  use_rl_shaping: true
  fn_penalty_weight: 2.0
  fp_penalty_weight: 0.8

responder:
  model: ppo
  learning_rate: 1.0e-4
  n_steps: 1024
  batch_size: 64
  n_epochs: 5
  gamma: 0.99
  ent_coef: 0.02
  n_actions: 5
  total_timesteps: 300000

joint_finetuning:
  enabled: true
  total_timesteps: 200000

environment:
  max_steps: 1000
  window_size: 5
  n_classes: 8
  n_envs: 4
  rewards:
    tp: 1.0
    tn: 0.3
    fp: -0.8
    fn: -2.0
    time_bonus: 0.1
