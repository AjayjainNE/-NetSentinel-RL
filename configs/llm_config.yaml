orchestrator:
  model: claude-sonnet-4-20250514
  max_tokens: 1000
  temperature: 0.1
  retries: 3
  timeout_seconds: 30
  enable_langsmith: true

prompting:
  strategy: chain_of_thought   # zero_shot | few_shot | chain_of_thought
  shap_top_k: 5                # Number of top SHAP features to include
  include_flow_stats: true

faithfulness:
  check_shap_grounding: true
  hallucination_detection: true
  bert_score_threshold: 0.75
